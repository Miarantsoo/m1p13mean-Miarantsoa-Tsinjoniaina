services:
  mongodb:
    image: mongo:7
    container_name: mean-mongodb-prod
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    volumes:
      - mongodb_data_prod:/data/db
      - mongodb_config_prod:/data/configdb
    networks:
      - mean-network-prod

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile-prod
    container_name: mean-backend-prod
    restart: always
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      MONGO_HOST: mongodb
    depends_on:
      - mongodb
    networks:
      - mean-network-prod
#    healthcheck:
#      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
#      interval: 30s
#      timeout: 10s
#      retries: 3
#      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile-prod
    container_name: mean-frontend-prod
    restart: always
    environment:
      API_URL: ${API_URL:-http://localhost:3001}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "81:81"
    depends_on:
      - backend
    networks:
      - mean-network-prod

networks:
  mean-network-prod:
    driver: bridge

volumes:
  mongodb_data_prod:
  mongodb_config_prod:
