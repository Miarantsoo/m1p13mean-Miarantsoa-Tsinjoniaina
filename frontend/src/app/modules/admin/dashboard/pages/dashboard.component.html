<div class="dashboard">

  <!-- ===== STATS ===== -->
  <div class="stats-grid">

    <div class="card">
      <div class="card-header">Boutiques actives</div>
      <div class="card-value">
        {{ totalShops }}
      </div>
    </div>

    <div class="card">
      <div class="card-header">Clients inscrits</div>
      <div class="card-value">
        {{ totalClients }}
      </div>
    </div>

  </div>

  <div class="card">
    <!-- HEADER -->
    <div class="card-top">
      <h2 class="card-title">Avancement des loyers</h2>

      <div class="year-selector">
        <button *ngIf="selectedYear > currentYear - 2" (click)="changeYear(-1)">
          ←
        </button>

        <span>{{ selectedYear }}</span>

        <button *ngIf="selectedYear < currentYear + 1" (click)="changeYear(1)">
          →
        </button>
      </div>
    </div>

    <!-- LOADING / ERROR -->
    <div *ngIf="isLoading" class="loading">Chargement des boutiques...</div>
    <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>

    <!-- TABLE -->
    <div *ngIf="!isLoading && !errorMessage" class="rent-table">
      <!-- TABLE HEADER -->
      <div class="table-row table-header">
        <div class="col-shop">Boutique</div>
        <div class="col-month" *ngFor="let month of monthNames">
          {{ month }}
        </div>
      </div>

      <!-- TABLE BODY -->
      <div class="table-row" *ngFor="let shop of shops; let i = index">
        <div class="col-shop shop-name">
          {{ shop.name }}
          <!-- Optionnel : petit indicateur d'index pour debug -->
          <!-- <small style="color: #999;">({{ i }})</small> -->
        </div>

        <div class="col-month" *ngFor="let status of getYearData(shop)">
          <div class="status-square" [ngClass]="status.toLowerCase()"></div>
        </div>
      </div>

      <div *ngIf="shops.length === 0" class="no-data">
        Aucune boutique trouvée
      </div>
    </div>
  </div>

</div>
