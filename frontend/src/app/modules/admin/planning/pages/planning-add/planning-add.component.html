<form [formGroup]="planningForm" (ngSubmit)="submit()" class="space-y-5">

  <z-form-field class="calendar-full-width">
    <z-form-label [zRequired]="true">Date</z-form-label>
      <z-calendar
        formControlName="date"
        zMode="single"
        [minDate]="today"

        class="rounded-md border"
      />
    <span class="text-sm text-red-500" [innerHTML]="f('date')?.touched && f('date')?.hasError('required') ? 'La date est requise' : ''">
    </span>
  </z-form-field>

  <z-form-field>
    <z-form-label [zRequired]="true">Heure</z-form-label>
    <z-form-control [errorMessage]="f('time')?.touched && f('time')?.hasError('required') ? 'L\'heure est requise' : ''">
      <input
        z-input
        type="time"
        formControlName="time"
        min="08:00"
        max="17:00"
        class="w-full"
        [zStatus]="f('time')?.touched && f('time')?.invalid ? 'error' : undefined"
      />
    </z-form-control>
  </z-form-field>

  <z-form-field>
    <z-form-label [zRequired]="true">Durée (minutes)</z-form-label>
    <z-form-control [errorMessage]="f('duration')?.touched && f('duration')?.hasError('required') ? 'La durée est requise' : f('duration')?.touched && f('duration')?.hasError('min') ? 'La durée minimale est de 15 minutes' : ''">
      <input
        z-input
        type="number"
        formControlName="duration"
        min="15"
        step="15"
        placeholder="Ex: 60"
        class="w-full"
        [zStatus]="f('duration')?.touched && f('duration')?.invalid ? 'error' : undefined"
      />
    </z-form-control>
  </z-form-field>

</form>
