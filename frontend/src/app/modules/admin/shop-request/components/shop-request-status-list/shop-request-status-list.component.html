<div class="shop-requests-container">
  <div *ngIf="loading" class="loading-state">
    <div class="spinner"></div>
    <p>Chargement des demandes...</p>
  </div>

  <div *ngIf="!loading && shopRequests.length === 0" class="empty-state">
    <p>Aucune demande de boutique pour le moment</p>
  </div>

  <div class="requests-grid" *ngIf="!loading && shopRequests.length > 0">
    <z-card
      *ngFor="let req of shopRequests"
      class="request-card"
      [class.expanded]="isExpanded(req._id)"
    >
      <div class="">

        <div class="flex h-full items-center justify-between">
          <div class="">
            <img
              [src]="req.image_link"
              [alt]="req.name"
              (error)="$any($event.target).src='https://via.placeholder.com/400x300?text=No+Image'"
            />
          </div>
          <div class="shop-info">
            <h3 class="shop-name">{{ req.name }}</h3>
            <div class="email-wrapper">
              <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="20" height="16" x="2" y="4" rx="2"/>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
              </svg>
              <p class="email">{{ req.email }}</p>
            </div>
          </div>

          <div class="letter-section">
            <div class="letter-header">
              <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                <polyline points="14 2 14 8 20 8"/>
              </svg>
              <h4>Lettre de motivation</h4>
            </div>

            <div class="letter-content">
              <p
                class="letter-text"
                [class.collapsed]="!isExpanded(req._id)"
                (click)="toggleExpand(req._id)"
              >
                <span *ngIf="!isExpanded(req._id)">
                  {{ req.covering_letter.substring(0, 150) }}...
                </span>
                <span *ngIf="isExpanded(req._id)">
                  {{ req.covering_letter }}
                </span>
              </p>

              <button
                z-button
                zType="ghost"
                zSize="sm"
                class="expand-button"
                (click)="toggleExpand(req._id)"
              >
                <svg *ngIf="!isExpanded(req._id)" class="icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="m6 9 6 6 6-6"/>
                </svg>
                <svg *ngIf="isExpanded(req._id)" class="icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="m18 15-6-6-6 6"/>
                </svg>
                {{ isExpanded(req._id) ? 'Réduire' : 'Lire plus' }}
              </button>
            </div>
          </div>

          <div class="card-footer">
            <div class="date-info">
              <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/>
                <line x1="16" x2="16" y1="2" y2="6"/>
                <line x1="8" x2="8" y1="2" y2="6"/>
                <line x1="3" x2="21" y1="10" y2="10"/>
              </svg>
              <small>{{ req.createdAt | date:'dd MMM yyyy à HH:mm' }}</small>
            </div>

            <button
              z-button
              zType="default"
              class="action-button"
              (click)="goToPlanning(req._id)"
            >
              <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 20h9"/>
                <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/>
              </svg>
              Ajouter planning
            </button>
          </div>
        </div>
      </div>
    </z-card>
  </div>

</div>
