<div class="flex justify-center items-center w-full h-full">
  <z-card
    zTitle="Plan du centre commercial"
    class="w-full h-full flex flex-col overflow-hidden"
  >
    <div class="relative w-full flex-1 overflow-hidden rounded-md min-h-0">
      <canvas
        #rendererCanvas
        class="renderer-canvas w-full h-full block"
      ></canvas>

      @if (hoveredShopName) {
        <div
          class="shop-tooltip"
          [style.left.px]="tooltipX + 14"
          [style.top.px]="tooltipY - 36"
        >
          {{ hoveredShopName }}
        </div>
      }

      @if (selectedShop) {
        <div class="shop-info-panel">
          <div class="shop-info-header">
            <span class="shop-info-title">{{ selectedShop.name }}</span>
            <button class="shop-info-close" (click)="deselectShop()" title="Fermer">✕</button>
          </div>
          <div class="shop-info-body">
            <p class="shop-info-label">Boutique sélectionnée</p>
            <p class="shop-info-name">{{ selectedShop.name }}</p>
          </div>
        </div>
      }
    </div>
  </z-card>
</div>
