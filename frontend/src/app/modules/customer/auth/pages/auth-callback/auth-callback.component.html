<div class="flex items-center justify-center min-h-screen">
  <z-card class="p-8 text-center max-w-md">
    <div *ngIf="!errorMessage" class="space-y-4">
      <div class="flex justify-center mb-4">
        <svg class="animate-spin h-12 w-12 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      </div>
      <h2 class="text-xl font-semibold">Connexion en cours...</h2>
      <p class="text-gray-600">Veuillez patienter pendant que nous finalisons votre connexion avec Google.</p>
    </div>

    <div *ngIf="errorMessage" class="space-y-4">
      <z-alert zType="destructive">
        {{ errorMessage }}
      </z-alert>
      <p class="text-sm text-gray-600">Redirection vers la page de connexion...</p>
    </div>
  </z-card>
</div>
