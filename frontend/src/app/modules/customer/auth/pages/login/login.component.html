<div class="login-container">
  <z-card class="p-4 sm:p-6 lg:p-8">
    <h1 class="text-2xl font-bold text-center mb-6">Se connecter à un compte</h1>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4 sm:space-y-6">
      <z-form-field>
        <z-form-label [zRequired]="true">Email</z-form-label>
        <z-form-control>
          <input
            z-input
            type="email"
            [zStatus]="registerForm.get('email')?.touched && registerForm.get('email')?.invalid ? 'error' : undefined"
            formControlName="email"
            placeholder="name@example.com"
            class="w-full"
          />
        </z-form-control>
        <z-form-message class="text-red-400" *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.hasError('required')">
          L'email est requis
        </z-form-message>
        <z-form-message class="text-red-400" *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.hasError('email')">
          L'email doit être valide
        </z-form-message>
      </z-form-field>

      <z-form-field>
        <z-form-label [zRequired]="true">Mot de passe</z-form-label>
        <z-form-control>
          <input
            z-input
            type="password"
            [zStatus]="registerForm.get('password')?.touched && registerForm.get('password')?.invalid ? 'error' : undefined"
            formControlName="password"
            placeholder="••••••••"
            class="w-full"
          />
        </z-form-control>
        <z-form-message class="text-red-400" *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.hasError('required')">
          Le mot de passe est requis
        </z-form-message>
      </z-form-field>

      <z-alert *ngIf="errorMessage" zType="destructive" class="mt-4">
        {{ errorMessage }}
      </z-alert>

      <button type="submit" z-button zFull [zLoading]="isLoading" [disabled]="isLoading || registerForm.invalid">
        Se connecter
      </button>

      <button type="button" z-button zFull class="bg-white text-black border shadow-sm flex items-center justify-center gap-2 py-2 hover:bg-gray-200" [zLoading]="isLoading" [disabled]="isLoading || registerForm.invalid" (click)="loginToGoogle()">
        <img src="assets/Logo-google-icon-PNG.png" alt="Logo Google" class="h-5 w-5 object-contain" />
        <span>Se connecter avec Google</span>
      </button>
    </form>

    <p class="text-center mt-4 text-sm">
      Vous n'avez pas encore de compte ?
      <a z-button zType="link" routerLink="/auth/register" class="p-0 ml-1">S'inscrire</a>
    </p>
  </z-card>
</div>
