<div class="card">
  <span class="card__category">{{ category }}</span>

  <div class="card__image-wrapper">
    <img class="card__image" [src]="imageUrl" [alt]="imageAlt" />
  </div>

  <div class="card__footer">
    <span class="card__code">{{ code }}</span>
    <span class="card__type">{{ type }}</span>
  </div>
</div>
