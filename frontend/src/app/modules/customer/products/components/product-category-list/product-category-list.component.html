<div class="relative flex flex-col min-h-screen">
  <!-- Loader -->
  <div *ngIf="loading()" class="flex flex-col items-center justify-center min-h-[400px] gap-6">
    <z-loader zSize="lg"></z-loader>
    <p class="text-gray-600 text-lg">Chargement des produits...</p>
  </div>

  <!-- Empty state -->
  <div *ngIf="!loading() && products.length === 0" class="text-center py-16">
    <svg class="w-24 h-24 mx-auto text-gray-300 mb-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="9" cy="21" r="1"/>
      <circle cx="20" cy="21" r="1"/>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
    </svg>
    <p class="text-gray-400 text-xl">Aucun produit dans cette catégorie</p>
  </div>

  <!-- Products grid -->
  <div *ngIf="!loading() && products.length > 0" class="flex-1 flex flex-col h-full">
    <div class="flex-1 px-4 pt-2 pb-4 overflow-auto">
      <div class="text-sm text-gray-600 mb-4">
        Affichage de <span class="font-semibold">{{ ((currentPage() - 1) * limit()) + 1 }}</span>
        à <span class="font-semibold">{{ Math.min(currentPage() * limit(), totalItems()) }}</span>
        sur <span class="font-semibold">{{ totalItems() }}</span> produits
      </div>
      <z-divider class="mb-4" />

      <div class="space-y-4">
        <app-product-card
          *ngFor="let product of products"
          [product]="product"
          (edit)="onEditProduct($event)"
          (delete)="onDeleteProduct($event)"
        />
      </div>
    </div>

    <!-- Pagination -->
    <div class="sticky bottom-0 mt-auto bg-white z-10 border-t">
      <div class="flex items-center justify-between px-4 py-2">
        <div class="flex items-center">
          <label class="text-sm font-medium text-gray-700 px-2">Éléments par page:</label>
          <select
            [value]="limit()"
            (change)="onLimitChange(+$any($event.target).value)"
            class="px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2"
          >
            <option *ngFor="let option of limitOptions" [value]="option">{{ option }}</option>
          </select>
        </div>

        <z-pagination
          [zTotal]="totalPages()"
          [(zPageIndex)]="currentPage"
          (zPageIndexChange)="onPageChange($event)"
          zSize="sm"
        />

        <div class="text-sm text-gray-600">
          Page {{ currentPage() }} sur {{ totalPages() }}
        </div>
      </div>
    </div>
  </div>
</div>
